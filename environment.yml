# Reproducible environment for the European Air Transport Network project.
#   conda env create -f environment.yml
#   conda activate eu-air-network
#
# conda-forge for everything installable there; pip only for the three
# packages not on conda-forge (python-louvain, pyvis, powerlaw).
name: eu-air-network
channels:
  - conda-forge
dependencies:
  - python=3.11
  # --- analysis ---
  - networkx>=3.2
  - pandas>=2.0
  - numpy>=1.24
  - scipy>=1.11
  - scikit-learn>=1.9
  # --- figures / maps ---
  - matplotlib>=3.7
  - plotly>=5.18
  - python-kaleido>=1.3        # Plotly static PNG export (NB01 banner)
  # --- notebooks ---
  - jupyter>=1.0
  - ipykernel>=6.0
  # --- dev tooling ---
  - nbstripout>=0.7            # git clean filter — strips notebook outputs
  - quarto                     # renders the website to docs/
  - pip
  - pip:
      - python-louvain>=0.16   # imported as `community` (Louvain modularity)
      - pyvis>=0.3.2           # interactive force-directed network
      - powerlaw>=2.0.0        # Clauset–Shalizi–Newman degree-distribution fit
